<!-- index.html -->
<!DOCTYPE html>
<html lang="ua">
<head>
  <meta charset="utf-8">
  <title>AR Viewer</title>

  <!-- Import-map для Three.js та доповненої реальності -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
      "three/examples/jsm/": "https://unpkg.com/three@0.150.1/examples/jsm/"
    }
  }
  </script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    #app { width: 100%; height: 100%; background-size: cover; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    #start-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6); z-index: 10;
    }
    #start-ar-btn {
      padding: 1em 2em; font-size: 1.2em; border: none; border-radius: 8px;
      background: #007ACC; color: white; cursor: pointer;
    }
    #overlay {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 0.5em; z-index: 10;
    }
    #close-ar { position: absolute; top: 10px; right: 10px; padding: 0.5em; }
    #model-buttons { display: flex; gap: 0.5em; overflow-x: auto; }
    #model-buttons button { padding: 0.5em 1em; }
    #order-button-container { margin-left: 1em; }
    #order-button { padding: 0.5em 1em; background: #28A745; color: white; text-decoration: none; border-radius: 4px; }
    #loading-seq {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none; width: 200px; height: 200px; z-index: 9;
    }
  </style>
</head>
<body id="app">
  <!-- Стартовий екран -->
  <div id="start-screen">
    <button id="start-ar-btn">…</button>
  </div>

  <!-- HTML-оверлей для AR-контролів -->
  <div id="overlay" hidden>
    <button id="close-ar">✕</button>
    <div id="model-buttons"></div>
    <div id="order-button-container" hidden>
      <a id="order-button" target="_blank"></a>
    </div>
  </div>

  <!-- Анімація завантаження ретикулу -->
  <img id="loading-seq" />

  <!-- WebGL-канвас -->
  <canvas id="ar-canvas"></canvas>

  <!-- Основний скрипт -->
  <script type="module" src="main.js"></script>
</body>
</html>
