<!DOCTYPE html>
<html lang="ua">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>AR Demo</title>

  <!-- Three.js та ARButton -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.151.3/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.151.3/examples/jsm/webxr/ARButton.js"></script>

  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    #start-ar {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      padding:1em 2em; font-size:1.2em;
      background:#fff; border:none; border-radius:5px;
      cursor:pointer;
    }
    #help-img {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      display:block; width:200px; height:200px;
    }
    #product-name {
      position:absolute; top:10px; left:50%;
      transform:translateX(-50%); font-size:1.5em;
      color:#333;
    }
    #order-button-container {
      position:absolute; bottom:20px; left:50%;
      transform:translateX(-50%);
    }
  </style>
</head>
<body>
  <div id="product-name"></div>
  <button id="start-ar">…</button>
  <div id="order-button-container" style="display:none;">
    <a id="order-button" href="#" target="_blank"></a>
  </div>
  <!-- для анімації помічника -->
  <img id="help-img" style="display:none;" />

  <script type="module">
  import { CONFIG } from './config.js';

  let translations = {
    startAr:   'Запустити AR',
    byButton:  'Замовити',
    instruction:'Наведіть камеру на поверхню',
    error:     'Сталася помилка',
    // text1…textN — за дефолтом візьмемо з entry.label
  };

  // 1) Локалізація
  fetch(`${(await import('./GoogleSheetsLocalization.json')).default.codeGsUrl}`
        +`?sheetKey=${(await import('./GoogleSheetsLocalization.json')).default.sheetKey}`
        +`&sheetName=${(await import('./GoogleSheetsLocalization.json')).default.sheetName}`)
    .then(r => r.json())
    .then(data => { translations = { ...translations, ...data }; })
    .catch(_ => console.warn('Fallback to default UA labels'));

  // 2) Фон
  if (CONFIG.background && CONFIG.backgroundName) {
    document.body.style.backgroundImage =
      `url(${CONFIG.background}/${CONFIG.backgroundName})`;
    document.body.style.backgroundSize = 'cover';
  }

  // 3) Підготовка UI до старту AR
  const btnStart = document.getElementById('start-ar');
  btnStart.textContent = translations.startAr;

  // назва товару
  document.getElementById('product-name')
    .textContent = CONFIG.commodityName || 'Помилка 005';

  btnStart.addEventListener('click', async () => {
    // Додаємо ARButton
    document.body.appendChild( ARButton.createButton(renderer) );
    btnStart.style.display = 'none';
    document.body.style.background = 'none';
    startARSession();
  });

  // 4) Основні змінні Three.js
  let camera, scene, renderer, reticle;
  let placedModel = null;
  let helpAnimInterval, helpFrame = 0;

  function init() {
    // Сцена, камера, light…
    scene    = new THREE.Scene();
    camera   = new THREE.PerspectiveCamera();
    renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    // ретикл
    reticle = new THREE.Mesh(
      new THREE.RingGeometry(0.15,0.2,32).rotateX(-Math.PI/2),
      new THREE.MeshBasicMaterial({ color:0xFFD800 }) // яскраво-жовтий
    );
    reticle.visible = false;
    scene.add(reticle);

    // жест pinch, якщо enabled
    if (CONFIG.enableScale) setupPinchToScale();

    // обробник тапу
    const controller = renderer.xr.getController(0);
    controller.addEventListener('select', onSelect);
    scene.add(controller);
  }

  function startARSession() {
    init();
    renderer.setAnimationLoop(render);
    startHelpAnim();
  }

  function render(timestamp, frame) {
    // детекція поверхні
    const refSpace = renderer.xr.getReferenceSpace();
    const session  = renderer.xr.getSession();
    if (frame) {
      const hitTest = frame.getHitTestResults(/* … */);
      if (hitTest.length > 0) {
        reticle.visible = true;
        reticle.matrix.fromArray(hitTest[0].getPose(refSpace).transform.matrix);
        stopHelpAnim();
      }
    }
    renderer.render(scene, camera);
  }

  // 5) Анімація допоміжних кадрів
  function startHelpAnim() {
    if (!CONFIG.helpToInstall) return;
    const img = document.getElementById('help-img');
    img.style.display = 'block';
    helpAnimInterval = setInterval(() => {
      img.src = `${CONFIG.helpToInstall}/frame_${String(helpFrame).padStart(2,'0')}_delay-0.08s.png`;
      helpFrame = (helpFrame + 1) % 75;
    }, 2000/75);
  }
  function stopHelpAnim() {
    clearInterval(helpAnimInterval);
    document.getElementById('help-img').style.display = 'none';
  }

  // 6) Розміщення моделі
  function onSelect() {
    if (!reticle.visible) return;
    // Тут — логіка завантаження та додавання 3D-моделі
    placedModel = new THREE.Mesh(
      new THREE.BoxGeometry(0.2,0.2,0.2),
      new THREE.MeshNormalMaterial()
    );
    placedModel.position.setFromMatrixPosition(reticle.matrix);
    scene.add(placedModel);

    buildModelButtons();
    showOrderButton();
  }

  // 7) Масштабування pinch
  function setupPinchToScale() {
    let initialDist = 0, initialScale = 1;
    document.addEventListener('touchstart', e => {
      if (e.touches.length === 2 && placedModel) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        initialDist  = Math.hypot(dx, dy);
        initialScale = placedModel.scale.x;
      }
    });
    document.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && placedModel) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const newDist = Math.hypot(dx, dy);
        const factor  = newDist / initialDist;
        placedModel.scale.setScalar(initialScale * factor);
      }
    });
  }

  // 8) Кнопки перемикання моделей
  const modelList = [
    { url:'model1.glb', label:'Модель 1' },
    { url:'model2.glb', label:'Модель 2' },
    // …
  ];
  function buildModelButtons() {
    const count = CONFIG.buttonsAr || modelList.length;
    const container = document.createElement('div');
    container.id = 'ar-buttons';
    container.style.position = 'absolute';
    container.style.bottom = '80px';
    container.style.left = '50%';
    container.style.transform = 'translateX(-50%)';
    modelList.slice(0,count).forEach((entry, idx) => {
      const btn = document.createElement('button');
      btn.textContent = translations[`text${idx+1}`] || entry.label;
      btn.onclick = () => {
        // змінити модель на entry.url
      };
      container.appendChild(btn);
    });
    document.body.appendChild(container);
  }

  // 9) Кнопка “Замовити”
  function showOrderButton() {
    if (!CONFIG.byUrl) return;
    const wrap = document.getElementById('order-button-container');
    const btn  = document.getElementById('order-button');
    btn.href    = CONFIG.byUrl;
    btn.textContent = translations.byButton || 'To order';
    wrap.style.display = 'block';
  }

  </script>
</body>
</html>
